- name: DBT_CI_ROLE
  comment: 'Role for CI/CD dbt runs — read all prod sources, write to dev database only'
  parent_roles:
    - SYSADMIN
  grants:

    - privilege: USAGE
      objects:
        - type: WAREHOUSE
          names: [COMPUTE_WH]
        - type: DATABASE
          names: [ANALYTICS_DB, ANALYTICS_STAGING_DB, RAW_DB, RAW_STAGING_DB, ORCHESTRATION_DB]
        - type: ALL SCHEMAS
          in: [DATABASE ANALYTICS_DB, DATABASE ANALYTICS_STAGING_DB, DATABASE RAW_DB, DATABASE RAW_STAGING_DB, DATABASE ORCHESTRATION_DB]
        - type: FUTURE SCHEMAS
          in: [DATABASE ANALYTICS_DB, DATABASE ANALYTICS_STAGING_DB, DATABASE RAW_DB, DATABASE RAW_STAGING_DB, DATABASE ORCHESTRATION_DB]

    # IMPORTED PRIVILEGES replaces individual USAGE/SELECT grants on shared/reader DBs
    - privilege: IMPORTED PRIVILEGES
      objects:
        - type: DATABASE
          names: [VENDOR_PRODUCT_A, VENDOR_PRODUCT_B, VENDOR_PRODUCT_C]

    - privilege: SELECT
      objects:
        - type: ALL TABLES
          in: [DATABASE ANALYTICS_DB, DATABASE ANALYTICS_STAGING_DB, DATABASE RAW_DB, DATABASE RAW_STAGING_DB, DATABASE ORCHESTRATION_DB]
        - type: ALL VIEWS
          in: [DATABASE ANALYTICS_DB, DATABASE ANALYTICS_STAGING_DB, DATABASE RAW_DB, DATABASE RAW_STAGING_DB, DATABASE ORCHESTRATION_DB]
        - type: ALL DYNAMIC TABLES
          in: [DATABASE RAW_DB]
        - type: FUTURE TABLES
          in: [DATABASE ANALYTICS_DB, DATABASE ANALYTICS_STAGING_DB, DATABASE RAW_DB, DATABASE RAW_STAGING_DB, DATABASE ORCHESTRATION_DB]
        - type: FUTURE VIEWS
          in: [DATABASE ANALYTICS_DB, DATABASE ANALYTICS_STAGING_DB, DATABASE RAW_DB, DATABASE RAW_STAGING_DB]
        - type: FUTURE DYNAMIC TABLES
          in: [DATABASE RAW_DB]

    - privilege: ALL PRIVILEGES
      objects:
        - type: DATABASE
          names: [DEV_DB]
        - type: ALL SCHEMAS
          in: [DATABASE DEV_DB]
        - type: ALL TABLES
          in: [DATABASE DEV_DB]
        - type: FUTURE SCHEMAS
          in: [DATABASE DEV_DB]
        - type: FUTURE TABLES
          in: [DATABASE DEV_DB]
        - type: FUTURE VIEWS
          in: [DATABASE DEV_DB]
